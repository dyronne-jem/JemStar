<!DOCTYPE html>
<html lang="en">
<head>

<title>Pellet Arena — Multiplayer Pac-Man</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0e1f;
    color: #e5e7eb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 1.25rem;
    max-width: 520px;
    width: 100%;
  }
  h2 { margin: 0 0 4px; font-size: 22px; font-weight: 500; }
  h3 { margin: 0; font-size: 16px; font-weight: 500; }
  h4 { margin: 12px 0 6px; font-size: 14px; font-weight: 500; color: #9ca3af; }
  .muted { font-size: 13px; color: #9ca3af; }
  .input {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    border: 1px solid #374151;
    border-radius: 8px;
    background: #1f2937;
    color: #e5e7eb;
    margin-bottom: 12px;
  }
  .input:focus { outline: none; border-color: #6366f1; }
  .btn {
    padding: 10px 20px;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #e5e7eb;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover:not(:disabled) { background: #374151; }
  .btn-primary {
    background: #fbbf24;
    color: #111827;
    border-color: #fbbf24;
  }
  .btn-primary:hover:not(:disabled) { background: #fcd34d; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 11px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .row.me { background: #312e81; }
  .row.other { background: #1f2937; }
  .canvas-wrap {
    background: #0c1024;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 12px;
  }
  canvas {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
    image-rendering: pixelated;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 4px;
    justify-content: center;
    margin-top: 8px;
  }
  .controls button {
    padding: 0;
    font-size: 22px;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 8px;
    color: #e5e7eb;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .controls button:active { background: #374151; }
  .controls .empty { background: transparent; border: none; pointer-events: none; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat {
    background: #1f2937;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .stat-num { font-size: 20px; font-weight: 500; }
  .stat-label { font-size: 11px; color: #9ca3af; }
  .status {
    font-size: 11px;
    color: #6b7280;
    text-align: center;
    margin-top: 4px;
    font-family: ui-monospace, monospace;
  }
  .status.connected { color: #34d399; }
  .status.error { color: #f87171; }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .config-warning {
    background: #7c2d12;
    border: 1px solid #c2410c;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: #fed7aa;
    margin-bottom: 12px;
  }
  .config-warning code {
    background: #431407;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>

<div id="app" class="card">
  <p class="muted">Loading…</p>
</div>

<!-- Firebase SDK (modular, ESM) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, onDisconnect, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// =============================================================================
// FIREBASE CONFIG — REPLACE THIS WITH YOUR OWN CONFIG FROM THE README
// =============================================================================
const firebaseConfig = {
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
  apiKey: "AIzaSyD3UbKKUqkNjC-rZVLiKmpKI_mOxGjTFv8",
  authDomain: "jemstar-f2b91.firebaseapp.com",
  databaseURL: "https://jemstar-f2b91-default-rtdb.firebaseio.com",
  projectId: "jemstar-f2b91",
  storageBucket: "jemstar-f2b91.firebasestorage.app",
  messagingSenderId: "946711565533",
  appId: "1:946711565533:web:ee49d70e06e9315ea5b734",
  measurementId: "G-B1YSMCRDVF"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
};
// =============================================================================

const CONFIGURED = !firebaseConfig.apiKey.startsWith("YOUR_");

// ===== Game constants =====
const MAZE = [
  "###################",
  "#........#........#",
  "#o##.###.#.###.##o#",
  "#.................#",
  "#.##.#.#####.#.##.#",
  "#....#...#...#....#",
  "####.### # ###.####",
  "...#.#       #.#...",
  "####.# ##### #.####",
  "       #   #       ",
  "####.# ##### #.####",
  "...#.#       #.#...",
  "####.### # ###.####",
  "#........#........#",
  "#.##.###.#.###.##.#",
  "#o.#...........#.o#",
  "##.#.#.#####.#.#.##",
  "#....#...#...#....#",
  "###################",
];
const ROWS = MAZE.length;
const COLS = MAZE[0].length;
const TILE = 22;
const W = COLS * TILE;
const H = ROWS * TILE;
const COLORS = ["#ffd23f", "#ff6b9d", "#4ecdc4", "#a78bfa", "#fb923c", "#34d399"];
const STEP_MS = 160;
const SYNC_MS = 120;
const POWER_DURATION_MS = 6000;
const GHOST_RESPAWN_MS = 4000;
const PLAYER_TIMEOUT_MS = 10000;
const ROOM = "main";

// ===== State =====
let app, db;
let me = null;            // { id, name, color }
let myState = null;       // local truth for my player
let players = {};         // { id: { name, color, r, c, dx, dy, score, poweredUntil, lastSeen } }
let ghosts = [];
let pellets = {};
let power = {};
let round = 1;
let ghostHost = { id: null, expiresAt: 0 };

let nextDir = { dx: 0, dy: 0 };
let lastTick = 0;
let lastSync = 0;
let rafHandle = null;
let connected = false;
let statusText = "starting";

// ===== Maze helpers =====
function isWall(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  return MAZE[r][c] === "#";
}
function moveOne(r, c, dx, dy) {
  let nr = r + dy;
  let nc = c + dx;
  if (r === 9 && nc < 0) nc = COLS - 1;
  if (r === 9 && nc >= COLS) nc = 0;
  if (isWall(nr, nc)) return null;
  return { r: nr, c: nc };
}
function freshPellets() {
  const p = {}, pw = {};
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const ch = MAZE[r][c];
      if (ch === ".") p[r + "_" + c] = true;
      if (ch === "o") pw[r + "_" + c] = true;
    }
  }
  return { pellets: p, power: pw };
}
function findSpawn(taken) {
  const candidates = [[1,1],[1,COLS-2],[ROWS-2,1],[ROWS-2,COLS-2],[3,3],[ROWS-4,COLS-4],[3,COLS-4],[ROWS-4,3],[5,5],[ROWS-6,COLS-6]];
  for (const [r, c] of candidates) {
    const key = r + "_" + c;
    if (!taken.has(key) && !isWall(r, c)) return { r, c };
  }
  return { r: 1, c: 1 };
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// ===== Firebase wiring =====
function roomRef(path = "") {
  return ref(db, `rooms/${ROOM}${path ? "/" + path : ""}`);
}

async function initFirebase() {
  app = initializeApp(firebaseConfig);
  db = getDatabase(app);

  // Initialize pellets if room is empty
  const initRef = roomRef("init");
  await runTransaction(initRef, (current) => {
    if (current === null) {
      const fresh = freshPellets();
      set(roomRef("pellets"), fresh.pellets);
      set(roomRef("power"), fresh.power);
      set(roomRef("round"), 1);
      return Date.now();
    }
    return current;
  });

  // Listen for shared state
  onValue(roomRef("players"), snap => {
    players = snap.val() || {};
    pruneStale();
  });
  onValue(roomRef("ghosts"), snap => {
    ghosts = snap.val() || [];
  });
  onValue(roomRef("pellets"), snap => {
    pellets = snap.val() || {};
  });
  onValue(roomRef("power"), snap => {
    power = snap.val() || {};
  });
  onValue(roomRef("round"), snap => {
    round = snap.val() || 1;
  });
  onValue(roomRef("ghostHost"), snap => {
    ghostHost = snap.val() || { id: null, expiresAt: 0 };
  });

  // Initialize ghosts if empty
  onValue(roomRef("ghosts"), async (snap) => {
    if (!snap.exists()) {
      await set(roomRef("ghosts"), [
        { id: "g1", r: 9, c: 8, dx: -1, dy: 0, deadUntil: 0, color: "#ef4444" },
        { id: "g2", r: 9, c: 10, dx: 1, dy: 0, deadUntil: 0, color: "#f97316" },
        { id: "g3", r: 9, c: 9, dx: 0, dy: -1, deadUntil: 0, color: "#06b6d4" },
      ]);
    }
  }, { onlyOnce: true });

  connected = true;
  statusText = "connected";
}

function pruneStale() {
  const now = Date.now();
  for (const id of Object.keys(players)) {
    if (now - (players[id].lastSeen || 0) > PLAYER_TIMEOUT_MS && id !== (me && me.id)) {
      remove(ref(db, `rooms/${ROOM}/players/${id}`));
    }
  }
}

async function syncMyPlayer() {
  if (!me || !myState) return;
  myState.lastSeen = Date.now();
  await set(ref(db, `rooms/${ROOM}/players/${me.id}`), {
    id: me.id,
    name: me.name,
    color: me.color,
    r: myState.r,
    c: myState.c,
    dx: myState.dx,
    dy: myState.dy,
    score: myState.score,
    poweredUntil: myState.poweredUntil || 0,
    lastSeen: myState.lastSeen,
  });
}

async function eatPellet(key) {
  await remove(ref(db, `rooms/${ROOM}/pellets/${key}`));
}
async function eatPower(key) {
  await remove(ref(db, `rooms/${ROOM}/power/${key}`));
}

async function refillIfEmpty() {
  if (Object.keys(pellets).length === 0 && Object.keys(power).length === 0) {
    const fresh = freshPellets();
    await runTransaction(roomRef("round"), (cur) => (cur || 1) + 1);
    await set(roomRef("pellets"), fresh.pellets);
    await set(roomRef("power"), fresh.power);
  }
}

async function tryClaimGhostHost() {
  await runTransaction(roomRef("ghostHost"), (cur) => {
    const now = Date.now();
    if (!cur || !cur.id || (cur.expiresAt || 0) < now) {
      return { id: me.id, expiresAt: now + 6000 };
    }
    if (cur.id === me.id) {
      return { id: me.id, expiresAt: now + 6000 };
    }
    return cur;
  });
}

async function stepGhosts() {
  const nowMs = Date.now();
  if (!ghostHost || ghostHost.id !== me.id || (ghostHost.expiresAt || 0) < nowMs) return;
  if (!ghosts || ghosts.length === 0) return;
  const updated = ghosts.map(g => ({ ...g }));
  for (const g of updated) {
    if (g.deadUntil > nowMs) continue;
    if (g.deadUntil && g.deadUntil <= nowMs) {
      g.r = 9; g.c = 9; g.deadUntil = 0;
    }
    let moved = null;
    if (Math.random() > 0.2) moved = moveOne(g.r, g.c, g.dx, g.dy);
    if (!moved) {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy]) => {
        if (dx === -g.dx && dy === -g.dy && (g.dx !== 0 || g.dy !== 0)) return false;
        return moveOne(g.r, g.c, dx, dy);
      });
      const pick = dirs.length ? dirs[Math.floor(Math.random() * dirs.length)] : null;
      if (pick) {
        g.dx = pick[0]; g.dy = pick[1];
        moved = moveOne(g.r, g.c, g.dx, g.dy);
      }
    }
    if (moved) { g.r = moved.r; g.c = moved.c; }
  }
  await set(roomRef("ghosts"), updated);
}

async function killGhost(idx) {
  await runTransaction(ref(db, `rooms/${ROOM}/ghosts/${idx}`), (g) => {
    if (!g) return g;
    g.deadUntil = Date.now() + GHOST_RESPAWN_MS;
    return g;
  });
}

// ===== Game loop =====
function gameLoop(now) {
  rafHandle = requestAnimationFrame(gameLoop);
  if (!myState) { drawStatus(); return; }

  if (now - lastTick >= STEP_MS) {
    lastTick = now;

    if (nextDir.dx !== 0 || nextDir.dy !== 0) {
      const t = moveOne(myState.r, myState.c, nextDir.dx, nextDir.dy);
      if (t) { myState.dx = nextDir.dx; myState.dy = nextDir.dy; }
    }
    if (myState.dx !== 0 || myState.dy !== 0) {
      const m = moveOne(myState.r, myState.c, myState.dx, myState.dy);
      if (m) { myState.r = m.r; myState.c = m.c; }
      else { myState.dx = 0; myState.dy = 0; }
    }

    const key = myState.r + "_" + myState.c;
    if (pellets[key]) {
      delete pellets[key];
      myState.score += 10;
      eatPellet(key);
    }
    if (power[key]) {
      delete power[key];
      myState.score += 50;
      myState.poweredUntil = Date.now() + POWER_DURATION_MS;
      eatPower(key);
    }

    refillIfEmpty();
    tryClaimGhostHost();
    stepGhosts();

    const nowMs = Date.now();
    (ghosts || []).forEach((g, i) => {
      if (g.deadUntil > nowMs) return;
      if (g.r === myState.r && g.c === myState.c) {
        if (myState.poweredUntil > nowMs) {
          killGhost(i);
          myState.score += 200;
        } else {
          myState.score = Math.max(0, myState.score - 100);
          const taken = new Set(Object.values(players).filter(pl => pl.id !== me.id).map(pl => pl.r + "_" + pl.c));
          const spawn = findSpawn(taken);
          myState.r = spawn.r;
          myState.c = spawn.c;
          myState.dx = 0; myState.dy = 0;
          nextDir = { dx: 0, dy: 0 };
        }
      }
    });
  }

  if (now - lastSync >= SYNC_MS) {
    lastSync = now;
    syncMyPlayer();
  }

  drawGame();
  drawStatus();
  refreshUI();
}

// ===== Rendering =====
function drawGame() {
  const canvas = document.getElementById("canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#0c1024";
  ctx.fillRect(0, 0, W, H);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (MAZE[r][c] === "#") {
        ctx.fillStyle = "#1e3a8a";
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
        ctx.fillStyle = "#3b82f6";
        ctx.fillRect(c * TILE + 2, r * TILE + 2, TILE - 4, TILE - 4);
        ctx.fillStyle = "#0c1024";
        ctx.fillRect(c * TILE + 4, r * TILE + 4, TILE - 8, TILE - 8);
      }
    }
  }

  ctx.fillStyle = "#fde68a";
  for (const k of Object.keys(pellets)) {
    const [r, c] = k.split("_").map(Number);
    ctx.beginPath();
    ctx.arc(c * TILE + TILE / 2, r * TILE + TILE / 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  const pulse = 4 + Math.sin(Date.now() / 200) * 1.5;
  ctx.fillStyle = "#fbbf24";
  for (const k of Object.keys(power)) {
    const [r, c] = k.split("_").map(Number);
    ctx.beginPath();
    ctx.arc(c * TILE + TILE / 2, r * TILE + TILE / 2, pulse, 0, Math.PI * 2);
    ctx.fill();
  }

  const now = Date.now();
  const myPowered = myState && myState.poweredUntil > now;
  for (const g of ghosts || []) {
    const x = g.c * TILE + TILE / 2;
    const y = g.r * TILE + TILE / 2;
    if (g.deadUntil > now) {
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(x - 3, y, 2, 0, Math.PI * 2);
      ctx.arc(x + 3, y, 2, 0, Math.PI * 2);
      ctx.fill();
      continue;
    }
    ctx.fillStyle = myPowered ? "#3b82f6" : g.color;
    ctx.beginPath();
    ctx.arc(x, y - 1, TILE / 2 - 2, Math.PI, 0);
    ctx.lineTo(x + TILE / 2 - 2, y + TILE / 2 - 3);
    ctx.lineTo(x + 3, y + TILE / 2 - 5);
    ctx.lineTo(x, y + TILE / 2 - 3);
    ctx.lineTo(x - 3, y + TILE / 2 - 5);
    ctx.lineTo(x - TILE / 2 + 2, y + TILE / 2 - 3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(x - 3, y - 1, 2, 0, Math.PI * 2);
    ctx.arc(x + 3, y - 1, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  const drawPlayer = (p, isMe) => {
    const x = p.c * TILE + TILE / 2;
    const y = p.r * TILE + TILE / 2;
    const powered = p.poweredUntil > now;
    ctx.fillStyle = p.color;
    const mouthOpen = (Math.floor(Date.now() / 120) % 2 === 0) ? 0.25 : 0.05;
    let angle = 0;
    if (p.dx === 1) angle = 0;
    else if (p.dx === -1) angle = Math.PI;
    else if (p.dy === -1) angle = -Math.PI / 2;
    else if (p.dy === 1) angle = Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, TILE / 2 - 2, angle + mouthOpen * Math.PI, angle - mouthOpen * Math.PI + Math.PI * 2);
    ctx.closePath();
    ctx.fill();
    if (powered) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, TILE / 2, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.fillStyle = isMe ? "#fff" : "rgba(255,255,255,0.7)";
    ctx.font = "10px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(p.name.slice(0, 10), x, y - TILE / 2 - 2);
  };

  for (const p of Object.values(players)) {
    if (p.id !== me.id) drawPlayer(p, false);
  }
  if (myState) drawPlayer({ ...myState, name: me.name, color: me.color, id: me.id }, true);
}

function drawStatus() {
  const el = document.getElementById("status");
  if (!el) return;
  el.textContent = statusText;
  el.className = "status " + (connected ? "connected" : statusText.startsWith("error") ? "error" : "");
}

function refreshUI() {
  const all = Object.values(players).sort((a, b) => b.score - a.score);
  const scoreEl = document.getElementById("score");
  if (!scoreEl) return;
  scoreEl.textContent = myState ? myState.score : 0;
  document.getElementById("playerCount").textContent = all.length;
  document.getElementById("pelletCount").textContent = Object.keys(pellets).length + Object.keys(power).length;
  const board = document.getElementById("board");
  board.innerHTML = all.map((p, i) => `
    <div class="row ${p.id === me.id ? 'me' : 'other'}">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px;vertical-align:middle;"></span>${i+1}. ${escapeHtml(p.name)}${p.id === me.id ? ' (you)' : ''}</span>
      <strong>${p.score}</strong>
    </div>
  `).join("");
}

// ===== Input =====
function setDirection(dx, dy) {
  nextDir = { dx, dy };
  if (myState) {
    const m = moveOne(myState.r, myState.c, dx, dy);
    if (m) { myState.dx = dx; myState.dy = dy; }
  }
}

// ===== Lifecycle =====
async function joinRoom(name) {
  const id = "p_" + Math.random().toString(36).slice(2, 10);
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  me = { id, name, color };

  const taken = new Set(Object.values(players).map(p => p.r + "_" + p.c));
  const spawn = findSpawn(taken);
  myState = {
    id, name, color,
    r: spawn.r, c: spawn.c,
    dx: 0, dy: 0,
    score: 0,
    poweredUntil: 0,
    lastSeen: Date.now(),
  };

  const myRef = ref(db, `rooms/${ROOM}/players/${id}`);
  onDisconnect(myRef).remove();

  await syncMyPlayer();
  renderUI();
  startLoop();
}

async function leaveRoom() {
  stopLoop();
  if (me) {
    await remove(ref(db, `rooms/${ROOM}/players/${me.id}`));
  }
  me = null; myState = null;
  renderJoin();
}

function startLoop() {
  if (rafHandle) cancelAnimationFrame(rafHandle);
  lastTick = lastSync = performance.now();
  rafHandle = requestAnimationFrame(gameLoop);
}
function stopLoop() {
  if (rafHandle) cancelAnimationFrame(rafHandle);
  rafHandle = null;
}

// ===== UI =====
const root = document.getElementById("app");

function renderConfigError() {
  root.innerHTML = `
    <h2>Setup needed</h2>
    <div class="config-warning">
      You haven't pasted your Firebase config yet. Open <code>index.html</code>,
      find <code>firebaseConfig</code> near the top of the script, and replace
      it with the values from your Firebase project. See <code>README.md</code>
      for step-by-step instructions.
    </div>
  `;
}

function renderJoin() {
  root.innerHTML = `
    <div style="text-align: center; margin-bottom: 1.25rem;">
      <h2>Pellet arena</h2>
      <p class="muted" style="margin: 4px 0 0;">Multiplayer Pac-Man — eat pellets, dodge ghosts, top the board</p>
    </div>
    <input id="name" class="input" placeholder="Enter your name" maxlength="14" />
    <button id="join" class="btn btn-primary" style="width: 100%;">Join arena</button>
    <p class="muted" style="margin: 1rem 0 0; text-align: center;">Share this URL — anyone who opens it joins your room.</p>
    <p id="status" class="status">connecting…</p>
  `;
  const input = document.getElementById("name");
  setTimeout(() => input && input.focus(), 50);
  const join = () => {
    const n = input.value.trim();
    if (!n || !connected) return;
    joinRoom(n);
  };
  document.getElementById("join").onclick = join;
  input.onkeydown = e => { if (e.key === "Enter") join(); };
}

function renderUI() {
  root.innerHTML = `
    <div class="header-row">
      <h3>Pellet arena</h3>
      <button id="leave" class="btn" style="padding: 6px 12px; font-size: 12px;">Leave</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="score">0</div><div class="stat-label">Your score</div></div>
      <div class="stat"><div class="stat-num" id="playerCount">1</div><div class="stat-label">Players</div></div>
      <div class="stat"><div class="stat-num" id="pelletCount">0</div><div class="stat-label">Pellets</div></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas" width="${W}" height="${H}"></canvas>
    </div>
    <div class="controls">
      <button class="empty"></button>
      <button data-dir="up">↑</button>
      <button class="empty"></button>
      <button data-dir="left">←</button>
      <button class="empty"></button>
      <button data-dir="right">→</button>
      <button class="empty"></button>
      <button data-dir="down">↓</button>
      <button class="empty"></button>
    </div>
    <p class="muted" style="text-align: center; margin: 8px 0 4px;">Arrow keys / WASD or tap controls</p>
    <p id="status" class="status">connected</p>
    <h4>Leaderboard</h4>
    <div id="board"></div>
  `;
  document.getElementById("leave").onclick = leaveRoom;
  root.querySelectorAll("[data-dir]").forEach(btn => {
    const d = btn.dataset.dir;
    const handler = (e) => {
      e.preventDefault();
      if (d === "up") setDirection(0, -1);
      else if (d === "down") setDirection(0, 1);
      else if (d === "left") setDirection(-1, 0);
      else if (d === "right") setDirection(1, 0);
    };
    btn.addEventListener("click", handler);
    btn.addEventListener("touchstart", handler, { passive: false });
  });
  if (!window._keyHandler) {
    window._keyHandler = (e) => {
      if (!myState) return;
      const k = e.key.toLowerCase();
      if (k === "arrowup" || k === "w") { setDirection(0, -1); e.preventDefault(); }
      else if (k === "arrowdown" || k === "s") { setDirection(0, 1); e.preventDefault(); }
      else if (k === "arrowleft" || k === "a") { setDirection(-1, 0); e.preventDefault(); }
      else if (k === "arrowright" || k === "d") { setDirection(1, 0); e.preventDefault(); }
    };
    window.addEventListener("keydown", window._keyHandler);
  }
}

// ===== Boot =====
async function boot() {
  if (!CONFIGURED) {
    renderConfigError();
    return;
  }
  try {
    await initFirebase();
    renderJoin();
  } catch (e) {
    statusText = "error: " + e.message;
    root.innerHTML = `<h2>Connection failed</h2><p class="muted">${escapeHtml(e.message)}</p><p class="muted">Check your Firebase config and database rules. See README.md.</p>`;
    console.error(e);
  }
}

boot();
</script>
</body>
</html>
