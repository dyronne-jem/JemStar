<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Department Wars: 4-Team Space Battle</title>
<style>
  :root {
    --finance: #00e5a8;
    --accounting: #ffb627;
    --risk: #ff4d6d;
    --strategy: #6dd3ff;
    --bg-0: #05060f;
    --bg-1: #0a0d1f;
    --ink: #e8ecff;
    --ink-dim: #8b92b8;
    --ink-faint: #4a5078;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at top, #0a0d1f 0%, #05060f 70%);
    color: var(--ink);
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    overflow: hidden;
    user-select: none;
  }

  /* ===== Login Screen ===== */
  #login {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 20% 30%, rgba(0,229,168,0.08), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,77,109,0.08), transparent 40%),
      var(--bg-0);
    z-index: 100;
  }
  #login.hidden { display: none; }
  .login-card {
    width: min(560px, 92vw);
    padding: 40px 36px;
    background: rgba(10,13,31,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .title {
    font-family: 'Orbitron', 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--finance), var(--strategy), var(--accounting), var(--risk));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .field-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 18px;
  }
  #nameInput {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  #nameInput:focus { border-color: var(--strategy); }
  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }
  .team-btn {
    padding: 18px 14px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-align: left;
    position: relative;
  }
  .team-btn::before {
    content: '';
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    background: var(--team-color);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--team-color);
  }
  .team-btn { padding-left: 36px; }
  .team-btn:hover { border-color: var(--team-color); background: rgba(0,0,0,0.6); }
  .team-btn.selected {
    border-color: var(--team-color);
    background: rgba(255,255,255,0.04);
    box-shadow: inset 0 0 0 1px var(--team-color);
  }
  #joinBtn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(90deg, var(--finance), var(--strategy));
    border: none;
    color: #000;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.1s;
  }
  #joinBtn:hover { transform: translateY(-1px); }
  #joinBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .controls-hint {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    color: var(--ink-faint);
    font-size: 11px;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  .controls-hint kbd {
    display: inline-block;
    padding: 2px 7px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    color: var(--ink);
    font-family: inherit;
    font-size: 10px;
    margin: 0 2px;
  }

  /* ===== Game UI ===== */
  #game { position: fixed; inset: 0; }
  canvas { display: block; cursor: crosshair; }

  #scoreboard {
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(5,6,15,0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 14px 18px;
    min-width: 220px;
  }
  #scoreboard h3 {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .team-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
  }
  .team-row .name {
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
  }
  .team-row .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }
  .team-row .score {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 16px;
  }

  #stats {
    position: fixed;
    top: 16px; right: 16px;
    background: rgba(5,6,15,0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-align: right;
  }
  #stats .you { color: var(--ink); font-weight: 700; }
  #stats .num { font-family: 'Orbitron', monospace; font-size: 14px; }

  #chat {
    position: fixed;
    bottom: 16px; left: 16px;
    width: 320px;
    background: rgba(5,6,15,0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    display: flex; flex-direction: column;
  }
  #chatLog {
    height: 160px;
    overflow-y: auto;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
  }
  #chatLog::-webkit-scrollbar { width: 4px; }
  #chatLog::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
  .chat-msg { margin-bottom: 4px; word-wrap: break-word; }
  .chat-msg .author { font-weight: 700; }
  .chat-msg .text { color: var(--ink-dim); margin-left: 4px; }
  .chat-msg.system .text { color: var(--ink-faint); font-style: italic; }
  #chatInput {
    width: 100%;
    padding: 10px 14px;
    background: rgba(0,0,0,0.4);
    border: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    color: var(--ink);
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  #chatInput::placeholder { color: var(--ink-faint); }

  #killfeed {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 280px;
    pointer-events: none;
  }
  .kill-msg {
    background: rgba(5,6,15,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 2px;
    padding: 6px 10px;
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: 0.05em;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }
  .kill-msg .killer { font-weight: 700; }
  .kill-msg .victim { font-weight: 700; }
  .kill-msg .arrow { color: var(--ink-faint); margin: 0 6px; }

  #respawn {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 50;
  }
  #respawn.show { display: flex; }
  #respawn .panel {
    background: rgba(5,6,15,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,77,109,0.4);
    padding: 32px 56px;
    text-align: center;
    border-radius: 3px;
  }
  #respawn .label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--risk);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #respawn .countdown {
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    color: var(--ink);
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login Screen -->
<div id="login">
  <div class="login-card">
    <div class="title">Department Wars</div>
    <div class="subtitle">// 4-Team Orbital Combat</div>

    <label class="field-label">Call Sign</label>
    <input id="nameInput" type="text" maxlength="16" placeholder="Enter your name..." autocomplete="off" />

    <label class="field-label">Choose Your Department</label>
    <div class="team-grid">
      <button class="team-btn" data-team="Finance" style="--team-color: var(--finance)">Finance</button>
      <button class="team-btn" data-team="Accounting" style="--team-color: var(--accounting)">Accounting</button>
      <button class="team-btn" data-team="Risk" style="--team-color: var(--risk)">Risk</button>
      <button class="team-btn" data-team="Strategy" style="--team-color: var(--strategy)">Strategy</button>
    </div>

    <button id="joinBtn" disabled>Launch</button>

    <div class="controls-hint">
      <kbd>W</kbd>/<kbd>↑</kbd> thrust &nbsp; <kbd>A</kbd><kbd>D</kbd>/<kbd>←</kbd><kbd>→</kbd> rotate &nbsp; <kbd>Space</kbd> fire<br>
      <kbd>Enter</kbd> chat &nbsp; Friendly fire is OFF — only enemies count.
    </div>
  </div>
</div>

<!-- Game -->
<div id="game">
  <canvas id="canvas"></canvas>

  <div id="scoreboard">
    <h3>// Department Standings</h3>
    <div class="team-row" data-team="Finance">
      <div class="name"><span class="dot" style="color: var(--finance); background: var(--finance)"></span>Finance</div>
      <div class="score" style="color: var(--finance)">0</div>
    </div>
    <div class="team-row" data-team="Accounting">
      <div class="name"><span class="dot" style="color: var(--accounting); background: var(--accounting)"></span>Accounting</div>
      <div class="score" style="color: var(--accounting)">0</div>
    </div>
    <div class="team-row" data-team="Risk">
      <div class="name"><span class="dot" style="color: var(--risk); background: var(--risk)"></span>Risk</div>
      <div class="score" style="color: var(--risk)">0</div>
    </div>
    <div class="team-row" data-team="Strategy">
      <div class="name"><span class="dot" style="color: var(--strategy); background: var(--strategy)"></span>Strategy</div>
      <div class="score" style="color: var(--strategy)">0</div>
    </div>
  </div>

  <div id="stats">
    <div class="you">YOU</div>
    <div>K <span class="num" id="myKills">0</span> &nbsp; D <span class="num" id="myDeaths">0</span></div>
    <div>Online <span class="num" id="onlineCount">0</span></div>
  </div>

  <div id="chat">
    <div id="chatLog"></div>
    <input id="chatInput" type="text" maxlength="120" placeholder="Press Enter to chat..." />
  </div>

  <div id="killfeed"></div>

  <div id="respawn">
    <div class="panel">
      <div class="label">// Hull Destroyed</div>
      <div class="countdown" id="countdownNum">3</div>
    </div>
  </div>
</div>

<!-- Firebase + Game Logic -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, update, remove, onValue, onChildAdded,
  onDisconnect, push, serverTimestamp, runTransaction, get, query, limitToLast
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// =====================================================================
// !! REPLACE WITH YOUR FIREBASE CONFIG !!
// =====================================================================
const firebaseConfig = {
  apiKey: "AIzaSyCg1smUjIauImTeCWUK-gO4IGyS3kst1v0",
  authDomain: "fars-wars.firebaseapp.com",
  databaseURL: "https://fars-wars-default-rtdb.firebaseio.com",
  projectId: "fars-wars",
  storageBucket: "fars-wars.firebasestorage.app",
  messagingSenderId: "238409729391",
  appId: "1:238409729391:web:ddb3159361513ad428949a",
  measurementId: "G-HBFF3D05FK"
};
// =====================================================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ---------- Game Constants ----------
const WORLD_W = 2400, WORLD_H = 1600;
const SHIP_R = 14;
const BULLET_SPEED = 520;
const BULLET_LIFE = 1.4;
const FIRE_COOLDOWN = 0.22;
const RESPAWN_TIME = 3;
const NETWORK_TICK = 1 / 15; // 15 Hz position broadcast
const TEAM_COLORS = {
  Finance:    "#00e5a8",
  Accounting: "#ffb627",
  Risk:       "#ff4d6d",
  Strategy:   "#6dd3ff"
};
const TEAMS = Object.keys(TEAM_COLORS);

// ---------- DOM ----------
const loginEl = document.getElementById('login');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const teamBtns = document.querySelectorAll('.team-btn');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const chatLog = document.getElementById('chatLog');
const chatInput = document.getElementById('chatInput');
const killfeed = document.getElementById('killfeed');
const respawnEl = document.getElementById('respawn');
const countdownNum = document.getElementById('countdownNum');
const myKillsEl = document.getElementById('myKills');
const myDeathsEl = document.getElementById('myDeaths');
const onlineCountEl = document.getElementById('onlineCount');

let selectedTeam = null;
let myId = null;
let myName = null;
let myTeam = null;

// ---------- Login UI ----------
teamBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    teamBtns.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTeam = btn.dataset.team;
    validateLogin();
  });
});
nameInput.addEventListener('input', validateLogin);
function validateLogin() {
  joinBtn.disabled = !(nameInput.value.trim() && selectedTeam);
}
joinBtn.addEventListener('click', startGame);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !joinBtn.disabled) startGame(); });

// ---------- Game State ----------
const players = new Map();   // id -> {x,y,angle,vx,vy,name,team,alive,kills,deaths}
const bullets = new Map();   // id -> {x,y,vx,vy,team,owner,birth}
const stars = [];
const particles = [];        // local-only explosion FX
let lastShot = 0;
let dead = false;
let respawnAt = 0;
let lastNetSend = 0;
let myState = null;

// Camera
const camera = { x: 0, y: 0 };

// Input
const keys = {};
window.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !loginEl.classList.contains('hidden')) return;
  if (document.activeElement === chatInput) return;
  if (document.activeElement === nameInput) return;
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// Generate background stars
for (let i = 0; i < 240; i++) {
  stars.push({
    x: Math.random() * WORLD_W,
    y: Math.random() * WORLD_H,
    s: Math.random() * 1.5 + 0.3,
    p: Math.random() * 0.6 + 0.2
  });
}

// ---------- Resize ----------
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---------- Start Game ----------
async function startGame() {
  myName = nameInput.value.trim().slice(0, 16);
  myTeam = selectedTeam;
  loginEl.classList.add('hidden');

  // Generate unique player id
  myId = 'p_' + Math.random().toString(36).slice(2, 10);

  // Pick spawn position
  const spawn = randomSpawn();
  myState = {
    x: spawn.x, y: spawn.y,
    angle: -Math.PI / 2,
    vx: 0, vy: 0,
    name: myName, team: myTeam,
    alive: true, kills: 0, deaths: 0,
    last: Date.now()
  };

  // Register with Firebase
  const playerRef = ref(db, `players/${myId}`);
  await set(playerRef, myState);
  onDisconnect(playerRef).remove();

  // Listen to all players
  onValue(ref(db, 'players'), snap => {
    const data = snap.val() || {};
    // Update local cache
    for (const id in data) {
      players.set(id, data[id]);
    }
    // Remove disconnected
    for (const id of [...players.keys()]) {
      if (!data[id]) players.delete(id);
    }
    onlineCountEl.textContent = Object.keys(data).length;
  });

  // Listen to bullets (fire-and-forget)
  onChildAdded(ref(db, 'bullets'), snap => {
    const b = snap.val();
    const id = snap.key;
    if (!b) return;
    bullets.set(id, { ...b, birth: performance.now() / 1000 });
    // Auto-cleanup remote tracking after lifetime
    setTimeout(() => bullets.delete(id), BULLET_LIFE * 1000 + 500);
    // Owner cleans up the DB record after life
    if (b.owner === myId) {
      setTimeout(() => remove(ref(db, `bullets/${id}`)).catch(()=>{}), BULLET_LIFE * 1000);
    }
  });

  // Listen to scores
  onValue(ref(db, 'scores'), snap => {
    const s = snap.val() || {};
    TEAMS.forEach(t => {
      const row = document.querySelector(`.team-row[data-team="${t}"] .score`);
      if (row) row.textContent = s[t] || 0;
    });
  });

  // Listen to chat (last 30)
  const chatQuery = query(ref(db, 'chat'), limitToLast(30));
  onChildAdded(chatQuery, snap => {
    const m = snap.val();
    appendChatMsg(m);
  });

  // Listen to killfeed
  onChildAdded(ref(db, 'killfeed'), snap => {
    const k = snap.val();
    if (!k) return;
    showKill(k);
    // Cleanup old killfeed entries (only the actor)
    if (k.killerId === myId) {
      setTimeout(() => remove(ref(db, `killfeed/${snap.key}`)).catch(()=>{}), 6000);
    }
  });

  // Send join message
  pushChat({ system: true, text: `${myName} joined ${myTeam}` });

  // Start loop
  requestAnimationFrame(loop);
}

function randomSpawn() {
  return {
    x: 200 + Math.random() * (WORLD_W - 400),
    y: 200 + Math.random() * (WORLD_H - 400)
  };
}

// ---------- Chat ----------
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const text = chatInput.value.trim();
    if (text) pushChat({ author: myName, team: myTeam, text });
    chatInput.value = '';
    chatInput.blur();
    e.stopPropagation();
  } else if (e.key === 'Escape') {
    chatInput.blur();
  }
});
window.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !loginEl.classList.contains('hidden') && document.activeElement !== chatInput) {
    chatInput.focus();
    e.preventDefault();
  }
});
function pushChat(msg) {
  const r = push(ref(db, 'chat'));
  set(r, { ...msg, ts: Date.now() });
  // Auto-delete after 60s (light cleanup; only msg author does it)
  setTimeout(() => remove(r).catch(()=>{}), 60000);
}
function appendChatMsg(m) {
  const div = document.createElement('div');
  div.className = 'chat-msg' + (m.system ? ' system' : '');
  if (m.system) {
    div.innerHTML = `<span class="text">${escapeHtml(m.text)}</span>`;
  } else {
    const color = TEAM_COLORS[m.team] || '#fff';
    div.innerHTML = `<span class="author" style="color:${color}">${escapeHtml(m.author)}:</span><span class="text">${escapeHtml(m.text)}</span>`;
  }
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  // Trim
  while (chatLog.children.length > 40) chatLog.removeChild(chatLog.firstChild);
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- Killfeed ----------
function showKill(k) {
  const div = document.createElement('div');
  div.className = 'kill-msg';
  const kc = TEAM_COLORS[k.killerTeam] || '#fff';
  const vc = TEAM_COLORS[k.victimTeam] || '#fff';
  div.innerHTML = `<span class="killer" style="color:${kc}">${escapeHtml(k.killer)}</span><span class="arrow">»</span><span class="victim" style="color:${vc}">${escapeHtml(k.victim)}</span>`;
  killfeed.appendChild(div);
  setTimeout(() => div.remove(), 5000);
  while (killfeed.children.length > 5) killfeed.removeChild(killfeed.firstChild);
}

// ---------- Game Loop ----------
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  tick(dt);
  render();

  requestAnimationFrame(loop);
}

function tick(dt) {
  const t = performance.now() / 1000;

  // ----- My ship -----
  if (!dead && myState) {
    // Rotate
    if (keys['a'] || keys['arrowleft'])  myState.angle -= 3.4 * dt;
    if (keys['d'] || keys['arrowright']) myState.angle += 3.4 * dt;
    // Thrust
    if (keys['w'] || keys['arrowup']) {
      myState.vx += Math.cos(myState.angle) * 280 * dt;
      myState.vy += Math.sin(myState.angle) * 280 * dt;
      // Engine particles
      particles.push({
        x: myState.x - Math.cos(myState.angle) * 12,
        y: myState.y - Math.sin(myState.angle) * 12,
        vx: -Math.cos(myState.angle) * 80 + (Math.random() - 0.5) * 60,
        vy: -Math.sin(myState.angle) * 80 + (Math.random() - 0.5) * 60,
        life: 0.4, max: 0.4,
        color: TEAM_COLORS[myTeam],
        size: 2
      });
    }
    // Drag
    myState.vx *= Math.pow(0.5, dt);
    myState.vy *= Math.pow(0.5, dt);
    // Cap speed
    const sp = Math.hypot(myState.vx, myState.vy);
    const maxSp = 320;
    if (sp > maxSp) { myState.vx *= maxSp/sp; myState.vy *= maxSp/sp; }
    // Move
    myState.x += myState.vx * dt;
    myState.y += myState.vy * dt;
    // Wrap
    if (myState.x < 0) myState.x += WORLD_W;
    if (myState.x > WORLD_W) myState.x -= WORLD_W;
    if (myState.y < 0) myState.y += WORLD_H;
    if (myState.y > WORLD_H) myState.y -= WORLD_H;

    // Fire
    if (keys[' '] && t - lastShot > FIRE_COOLDOWN) {
      lastShot = t;
      fireBullet();
    }

    // Network broadcast
    if (t - lastNetSend > NETWORK_TICK) {
      lastNetSend = t;
      update_db(`players/${myId}`, {
        x: myState.x, y: myState.y, angle: myState.angle,
        vx: myState.vx, vy: myState.vy, alive: true,
        last: Date.now()
      });
    }
  }

  // Respawn countdown
  if (dead) {
    const remaining = Math.max(0, respawnAt - t);
    countdownNum.textContent = Math.ceil(remaining) || 1;
    if (remaining <= 0) doRespawn();
  }

  // ----- Bullets -----
  for (const [id, b] of bullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < 0) b.x += WORLD_W;
    if (b.x > WORLD_W) b.x -= WORLD_W;
    if (b.y < 0) b.y += WORLD_H;
    if (b.y > WORLD_H) b.y -= WORLD_H;

    // Check expiry
    if (t - b.birth > BULLET_LIFE) { bullets.delete(id); continue; }

    // Collide only against MY ship; the victim reports the death.
    if (!dead && myState && b.owner !== myId && b.team !== myTeam) {
      const dx = b.x - myState.x;
      const dy = b.y - myState.y;
      if (dx*dx + dy*dy < (SHIP_R + 4) * (SHIP_R + 4)) {
        // I'm hit
        bullets.delete(id);
        handleDeath(b);
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= Math.pow(0.3, dt);
    p.vy *= Math.pow(0.3, dt);
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Camera follows me (or freezes when dead)
  if (myState) {
    camera.x = myState.x - canvas.width / 2;
    camera.y = myState.y - canvas.height / 2;
  }
}

async function update_db(path, data) {
  try { await update(ref(db, path), data); } catch(e) {}
}

function fireBullet() {
  const r = push(ref(db, 'bullets'));
  const id = r.key;
  const b = {
    x: myState.x + Math.cos(myState.angle) * 18,
    y: myState.y + Math.sin(myState.angle) * 18,
    vx: Math.cos(myState.angle) * BULLET_SPEED + myState.vx * 0.5,
    vy: Math.sin(myState.angle) * BULLET_SPEED + myState.vy * 0.5,
    team: myTeam,
    owner: myId,
    ts: Date.now()
  };
  set(r, b);
  // Track locally too (since we don't onChildAdded our own writes if local cache races)
  bullets.set(id, { ...b, birth: performance.now()/1000 });
}

function handleDeath(bullet) {
  if (dead) return;
  dead = true;
  respawnAt = performance.now() / 1000 + RESPAWN_TIME;
  respawnEl.classList.add('show');

  // Explosion particles
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 200;
    particles.push({
      x: myState.x, y: myState.y,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 0.8, max: 0.8,
      color: TEAM_COLORS[myTeam],
      size: 2 + Math.random() * 2
    });
  }

  // Update my deaths in DB
  myState.deaths++;
  myDeathsEl.textContent = myState.deaths;
  update_db(`players/${myId}`, { alive: false, deaths: myState.deaths });

  // Find killer in player list
  const killer = players.get(bullet.owner);
  if (killer) {
    // Increment killer's kills (transaction so concurrent kills don't clobber)
    runTransaction(ref(db, `players/${bullet.owner}/kills`), v => (v || 0) + 1).catch(()=>{});
    // Award team score
    runTransaction(ref(db, `scores/${bullet.team}`), v => (v || 0) + 1).catch(()=>{});
    // Push killfeed
    const kr = push(ref(db, 'killfeed'));
    set(kr, {
      killer: killer.name, killerTeam: killer.team, killerId: bullet.owner,
      victim: myName, victimTeam: myTeam,
      ts: Date.now()
    });
  }
}

function doRespawn() {
  dead = false;
  respawnEl.classList.remove('show');
  const spawn = randomSpawn();
  myState.x = spawn.x; myState.y = spawn.y;
  myState.vx = 0; myState.vy = 0;
  myState.angle = Math.random() * Math.PI * 2;
  update_db(`players/${myId}`, {
    x: myState.x, y: myState.y, vx: 0, vy: 0,
    angle: myState.angle, alive: true
  });
}

// ---------- Render ----------
function render() {
  ctx.fillStyle = '#05060f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // Stars (parallax-ish, just static for simplicity)
  for (const s of stars) {
    // Draw with simple wrap visibility
    drawWrapped(s.x, s.y, () => {
      ctx.fillStyle = `rgba(255,255,255,${s.p})`;
      ctx.fillRect(s.x - s.s/2, s.y - s.s/2, s.s, s.s);
    });
  }

  // World boundary glow
  ctx.strokeStyle = 'rgba(109, 211, 255, 0.15)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.max;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Players
  for (const [id, p] of players) {
    if (!p.alive && id !== myId) continue;
    if (id === myId && dead) continue;
    drawShip(p, id === myId);
  }

  // Bullets
  for (const [id, b] of bullets) {
    ctx.fillStyle = TEAM_COLORS[b.team] || '#fff';
    ctx.shadowColor = TEAM_COLORS[b.team];
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();

  // Update my K/D in HUD from DB-side data
  if (myState) {
    const me = players.get(myId);
    if (me) myKillsEl.textContent = me.kills || 0;
  }
}

function drawWrapped(x, y, fn) {
  // Draw at original; canvas wrapping isn't free, but stars are static so just call fn once.
  fn();
}

function drawShip(p, isMe) {
  const color = TEAM_COLORS[p.team] || '#fff';
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  // Ship body — triangle with notch
  ctx.shadowColor = color;
  ctx.shadowBlur = isMe ? 16 : 10;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(16, 0);
  ctx.lineTo(-12, 10);
  ctx.lineTo(-7, 0);
  ctx.lineTo(-12, -10);
  ctx.closePath();
  ctx.fill();

  // Inner detail
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.moveTo(8, 0);
  ctx.lineTo(-6, 5);
  ctx.lineTo(-3, 0);
  ctx.lineTo(-6, -5);
  ctx.closePath();
  ctx.fill();

  // "ME" indicator: pulsing ring
  if (isMe) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 300);
    ctx.strokeStyle = `rgba(255,255,255,${0.3 + pulse * 0.3})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();

  // Name label
  ctx.font = '600 11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText(p.name, p.x, p.y - 22 + 1);
  ctx.fillStyle = color;
  ctx.fillText(p.name, p.x, p.y - 22);
}

// ---------- Cleanup on unload ----------
window.addEventListener('beforeunload', () => {
  if (myId) remove(ref(db, `players/${myId}`)).catch(()=>{});
});

</script>
</body>
</html>
